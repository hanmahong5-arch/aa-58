# ==========================================
# 		  DATABASE CONFIGURATIONS
# ==========================================

# Database JDBC URL
database.url = jdbc:postgresql://localhost:5432/al_server_gs

# Database user
database.user = postgres

# Database password
# NOTE: Change this! Root password is not safe!
database.password = postgres

# Maximum number of connections in the pool (HikariCP)
database.connections.max = 10

# Connection timeout in milliseconds (HikariCP)
database.timeout = 30000
